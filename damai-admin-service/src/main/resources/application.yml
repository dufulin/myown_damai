server:
  port: 8085

spring:
  config:
    import: optional:classpath:damai-observability.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: damai-admin-service
  datasource:
    url: ${DAMAI_ADMIN_DB_URL:${DAMAI_DB_URL:jdbc:mysql://${DAMAI_MYSQL_HOST:localhost}:${DAMAI_MYSQL_PORT:3306}/${DAMAI_MYSQL_DATABASE:myown_damai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DAMAI_DB_USERNAME:root}
    password: ${DAMAI_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      username: ${DAMAI_NACOS_USERNAME:nacos}
      password: ${DAMAI_NACOS_PASSWORD:nacos}
      config:
        enabled: ${DAMAI_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        group: ${DAMAI_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yml
      discovery:
        enabled: ${DAMAI_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${DAMAI_NACOS_REGISTER_ENABLED:true}
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        service: ${spring.application.name}
        group: ${DAMAI_NACOS_GROUP:DEFAULT_GROUP}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  admin:
    user-service-url: ${DAMAI_USER_SERVICE_URL:http://damai-user-service}
    program-service-url: ${DAMAI_PROGRAM_SERVICE_URL:http://damai-program-service}
    order-service-url: ${DAMAI_ORDER_SERVICE_URL:http://damai-order-service}
    pay-service-url: ${DAMAI_PAY_SERVICE_URL:http://damai-pay-service}
    client:
      connect-timeout-millis: ${DAMAI_ADMIN_CLIENT_CONNECT_TIMEOUT_MILLIS:1000}
      response-timeout-millis: ${DAMAI_ADMIN_CLIENT_RESPONSE_TIMEOUT_MILLIS:3000}
      read-timeout-millis: ${DAMAI_ADMIN_CLIENT_READ_TIMEOUT_MILLIS:3000}
      write-timeout-millis: ${DAMAI_ADMIN_CLIENT_WRITE_TIMEOUT_MILLIS:3000}
      timeout-millis: ${DAMAI_ADMIN_CLIENT_TIMEOUT_MILLIS:3500}

resilience4j:
  circuitbreaker:
    instances:
      adminOperationClient:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
