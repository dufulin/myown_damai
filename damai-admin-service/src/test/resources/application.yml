spring:
  cloud:
    discovery:
      enabled: false
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
        register-enabled: false
  datasource:
    url: jdbc:h2:mem:damai_admin;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
