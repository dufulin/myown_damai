server:
  port: 8080

spring:
  application:
    name: myown-damai
  datasource:
    url: jdbc:h2:mem:damai;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

damai:
  auth:
    session-ttl-hours: 24
