server:
  port: 8083

spring:
  application:
    name: damai-order-service
  datasource:
    url: ${DAMAI_ORDER_DB_URL:${DAMAI_DB_URL:jdbc:mysql://localhost:3306/myown_damai?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DAMAI_DB_USERNAME:root}
    password: ${DAMAI_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${DAMAI_REDIS_HOST:localhost}
      port: ${DAMAI_REDIS_PORT:6379}
      password: ${DAMAI_REDIS_PASSWORD:}
      database: ${DAMAI_REDIS_DATABASE:0}
      timeout: 2s
  kafka:
    bootstrap-servers: ${DAMAI_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 10000
        request.timeout.ms: 5000
        delivery.timeout.ms: 12000
    consumer:
      group-id: ${DAMAI_ORDER_KAFKA_GROUP_ID:damai-order-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        enabled: ${DAMAI_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${DAMAI_NACOS_REGISTER_ENABLED:true}
        server-addr: localhost:8848
        username: nacos
        password: nacos
        service: ${spring.application.name}
        group: ${DAMAI_NACOS_GROUP:DEFAULT_GROUP}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  program-service:
    base-url: ${DAMAI_PROGRAM_SERVICE_BASE_URL:http://localhost:8082}
  order:
    timeout-minutes: 15
    timeout-scan-enabled: true
    timeout-scan-delay-millis: 60000
    async:
      enabled: true
      create-topic: ${DAMAI_ORDER_CREATE_TOPIC:damai-order-create}
      retry-topic: ${DAMAI_ORDER_CREATE_RETRY_TOPIC:damai-order-create-retry}
      dead-topic: ${DAMAI_ORDER_CREATE_DEAD_TOPIC:damai-order-create-dead}
      send-timeout-seconds: ${DAMAI_ORDER_KAFKA_SEND_TIMEOUT_SECONDS:10}
      max-retry-count: ${DAMAI_ORDER_ASYNC_MAX_RETRY_COUNT:3}
    inventory:
      enabled: ${DAMAI_ORDER_INVENTORY_ENABLED:true}
    lock:
      redisson-enabled: true
      wait-seconds: 3
      lease-seconds: 10
