server:
  port: 8083

spring:
  config:
    import: optional:classpath:damai-observability.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: damai-order-service
  datasource:
    url: ${DAMAI_ORDER_DB_URL:${DAMAI_DB_URL:jdbc:mysql://${DAMAI_MYSQL_HOST:localhost}:${DAMAI_MYSQL_PORT:3306}/${DAMAI_MYSQL_DATABASE:myown_damai}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DAMAI_DB_USERNAME:root}
    password: ${DAMAI_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${DAMAI_REDIS_HOST:localhost}
      port: ${DAMAI_REDIS_PORT:6379}
      password: ${DAMAI_REDIS_PASSWORD:123}
      database: ${DAMAI_REDIS_DATABASE:0}
      timeout: 2s
  kafka:
    bootstrap-servers: ${DAMAI_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      observation-enabled: true
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 10000
        request.timeout.ms: 5000
        delivery.timeout.ms: 12000
        linger.ms: ${DAMAI_ORDER_KAFKA_LINGER_MS:20}
        batch.size: ${DAMAI_ORDER_KAFKA_BATCH_SIZE:32768}
        compression.type: ${DAMAI_ORDER_KAFKA_COMPRESSION_TYPE:lz4}
    consumer:
      group-id: ${DAMAI_ORDER_KAFKA_GROUP_ID:damai-order-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.records: ${DAMAI_ORDER_KAFKA_MAX_POLL_RECORDS:20}
  cloud:
    nacos:
      username: ${DAMAI_NACOS_USERNAME:nacos}
      password: ${DAMAI_NACOS_PASSWORD:nacos}
      config:
        enabled: ${DAMAI_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        group: ${DAMAI_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yml
      discovery:
        enabled: ${DAMAI_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${DAMAI_NACOS_REGISTER_ENABLED:true}
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        service: ${spring.application.name}
        group: ${DAMAI_NACOS_GROUP:DEFAULT_GROUP}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  user-service:
    base-url: ${DAMAI_USER_SERVICE_BASE_URL:http://localhost:8081}
    client:
      connect-timeout-millis: ${DAMAI_USER_CONNECT_TIMEOUT_MILLIS:1000}
      read-timeout-millis: ${DAMAI_USER_READ_TIMEOUT_MILLIS:2500}
      retry-count: ${DAMAI_USER_RETRY_COUNT:1}
      retry-backoff-millis: ${DAMAI_USER_RETRY_BACKOFF_MILLIS:150}
  program-service:
    base-url: ${DAMAI_PROGRAM_SERVICE_BASE_URL:http://localhost:8082}
    client:
      connect-timeout-millis: ${DAMAI_PROGRAM_CONNECT_TIMEOUT_MILLIS:1000}
      read-timeout-millis: ${DAMAI_PROGRAM_READ_TIMEOUT_MILLIS:2500}
      retry-count: ${DAMAI_PROGRAM_RETRY_COUNT:1}
      retry-backoff-millis: ${DAMAI_PROGRAM_RETRY_BACKOFF_MILLIS:150}
  order:
    timeout-minutes: 15
    timeout-scan-enabled: true
    timeout-scan-delay-millis: 60000
    timeout-scan-lock:
      wait-seconds: 1
      lease-seconds: 120
    async:
      enabled: true
      create-topic: ${DAMAI_ORDER_CREATE_TOPIC:damai-order-create}
      retry-topic: ${DAMAI_ORDER_CREATE_RETRY_TOPIC:damai-order-create-retry}
      dead-topic: ${DAMAI_ORDER_CREATE_DEAD_TOPIC:damai-order-create-dead}
      topic-partitions: ${DAMAI_ORDER_ASYNC_TOPIC_PARTITIONS:6}
      consumer-concurrency: ${DAMAI_ORDER_ASYNC_CONSUMER_CONCURRENCY:3}
      send-timeout-seconds: ${DAMAI_ORDER_KAFKA_SEND_TIMEOUT_SECONDS:10}
      max-retry-count: ${DAMAI_ORDER_ASYNC_MAX_RETRY_COUNT:3}
    inventory:
      enabled: ${DAMAI_ORDER_INVENTORY_ENABLED:true}
    lock:
      redisson-enabled: true
      wait-seconds: 3
      lease-seconds: 10

resilience4j:
  circuitbreaker:
    instances:
      orderProgramInventoryClient:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.myown.damai.common.exception.BusinessException
      orderTicketUserClient:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.myown.damai.common.exception.BusinessException
