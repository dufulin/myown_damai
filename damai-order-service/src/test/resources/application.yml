spring:
  cloud:
    discovery:
      enabled: false
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
        register-enabled: false
  datasource:
    url: jdbc:h2:mem:damai_order;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  program-service:
    base-url: http://localhost:8082
  order:
    timeout-minutes: 15
    timeout-scan-enabled: false
    timeout-scan-delay-millis: 600000
    async:
      enabled: false
      create-topic: damai-order-create-test
      retry-topic: damai-order-create-retry-test
      dead-topic: damai-order-create-dead-test
      max-retry-count: 3
    inventory:
      enabled: false
    lock:
      redisson-enabled: false
