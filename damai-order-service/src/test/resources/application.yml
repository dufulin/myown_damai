spring:
  cloud:
    discovery:
      enabled: false
    nacos:
      discovery:
        enabled: false
        register-enabled: false
  datasource:
    url: jdbc:h2:mem:damai_order;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  order:
    timeout-minutes: 15
    timeout-scan-enabled: false
    timeout-scan-delay-millis: 600000
    lock:
      redisson-enabled: false
