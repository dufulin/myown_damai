server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: damai-gateway-service
  data:
    redis:
      repositories:
        enabled: false
      host: ${DAMAI_REDIS_HOST:localhost}
      port: ${DAMAI_REDIS_PORT:6379}
      password: ${DAMAI_REDIS_PASSWORD:}
      database: ${DAMAI_REDIS_DATABASE:0}
      timeout: 2s
  cloud:
    nacos:
      username: ${DAMAI_NACOS_USERNAME:nacos}
      password: ${DAMAI_NACOS_PASSWORD:nacos}
      config:
        enabled: ${DAMAI_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        group: ${DAMAI_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yml
      discovery:
        enabled: ${DAMAI_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${DAMAI_NACOS_REGISTER_ENABLED:true}
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        service: ${spring.application.name}
        group: ${DAMAI_NACOS_GROUP:DEFAULT_GROUP}
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
      routes:
        - id: damai-user-service
          uri: lb://damai-user-service
          predicates:
            - Path=/api/users/**
        - id: damai-program-service
          uri: lb://damai-program-service
          predicates:
            - Path=/api/programs/**
        - id: damai-order-service
          uri: lb://damai-order-service
          predicates:
            - Path=/api/orders/**
        - id: damai-pay-service
          uri: lb://damai-pay-service
          predicates:
            - Path=/api/pay/**

damai:
  gateway:
    auth-enabled: true
    user-service-url: http://damai-user-service
    user-service:
      connect-timeout-millis: ${DAMAI_GATEWAY_USER_CONNECT_TIMEOUT_MILLIS:1000}
      response-timeout-millis: ${DAMAI_GATEWAY_USER_RESPONSE_TIMEOUT_MILLIS:1500}
      read-timeout-millis: ${DAMAI_GATEWAY_USER_READ_TIMEOUT_MILLIS:1500}
      write-timeout-millis: ${DAMAI_GATEWAY_USER_WRITE_TIMEOUT_MILLIS:1500}
      timeout-millis: ${DAMAI_GATEWAY_USER_TIMEOUT_MILLIS:1800}
      retry-count: ${DAMAI_GATEWAY_USER_RETRY_COUNT:1}
      retry-backoff-millis: ${DAMAI_GATEWAY_USER_RETRY_BACKOFF_MILLIS:100}
    rate-limit-enabled: true
    rate-limit:
      max-requests: 120
      window-seconds: 60
  cache:
    redis-enabled: true

resilience4j:
  circuitbreaker:
    instances:
      gatewayUserAuth:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
