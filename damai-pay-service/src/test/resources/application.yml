spring:
  datasource:
    url: jdbc:h2:mem:damai_pay;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
        register-enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  pay:
    order-service-url: http://damai-order-service
    event:
      compensation-enabled: false
      scan-delay-millis: 600000
      scan-limit: 10
      max-retry-count: 3
      retry-base-delay-seconds: 1
      retry-max-delay-seconds: 2
      processing-timeout-seconds: 10
    alipay:
      enabled: false
      verify-signature: false
