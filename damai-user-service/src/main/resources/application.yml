server:
  port: 8081

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: damai-user-service
  datasource:
    url: ${DAMAI_USER_DB_URL:${DAMAI_DB_URL:jdbc:mysql://${DAMAI_MYSQL_HOST:localhost}:${DAMAI_MYSQL_PORT:3306}/${DAMAI_MYSQL_DATABASE:myown_damai}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DAMAI_DB_USERNAME:root}
    password: ${DAMAI_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      repositories:
        enabled: false
      host: ${DAMAI_REDIS_HOST:localhost}
      port: ${DAMAI_REDIS_PORT:6379}
      password: ${DAMAI_REDIS_PASSWORD:}
      database: ${DAMAI_REDIS_DATABASE:0}
      timeout: 2s
  cloud:
    nacos:
      username: ${DAMAI_NACOS_USERNAME:nacos}
      password: ${DAMAI_NACOS_PASSWORD:nacos}
      config:
        enabled: ${DAMAI_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        group: ${DAMAI_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yml
      discovery:
        enabled: ${DAMAI_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${DAMAI_NACOS_REGISTER_ENABLED:true}
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        service: ${spring.application.name}
        group: ${DAMAI_NACOS_GROUP:DEFAULT_GROUP}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  auth:
    session-ttl-hours: 24
  cache:
    redis-enabled: true
    null-ttl-minutes: 5
    user-ttl-hours: 6
    session-ttl-hours: 24
