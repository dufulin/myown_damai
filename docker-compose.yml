name: ${COMPOSE_PROJECT_NAME:-myown-damai-infra}

services:
  mysql:
    image: mysql:5.7
    restart: unless-stopped
    ports:
      - "${DAMAI_MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DAMAI_DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DAMAI_MYSQL_DATABASE:-myown_damai}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-logs:/var/log/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - damai-network

  redis:
    image: redis:6.0.8
    restart: unless-stopped
    ports:
      - "${DAMAI_REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${DAMAI_REDIS_PASSWORD:-123}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${DAMAI_REDIS_PASSWORD:-123}
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${REDIS_PASSWORD}" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - damai-network

  nacos:
    image: nacos/nacos-server:v2.2.3
    restart: unless-stopped
    ports:
      - "${DAMAI_NACOS_PORT:-8848}:8848"
      - "${DAMAI_NACOS_GRPC_PORT:-9848}:9848"
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_SYSTEM_TYPE: nacos
      NACOS_AUTH_TOKEN: ${DAMAI_NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567890123456789}
      NACOS_AUTH_IDENTITY_KEY: ${DAMAI_NACOS_IDENTITY_KEY:-XN3zr6HfJV%LjUPjRBQzBB}
      NACOS_AUTH_IDENTITY_VALUE: ${DAMAI_NACOS_IDENTITY_VALUE:-B3CU%K3AxEAMrgPBdKLRQRL}
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/liveness
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      damai-network:
        aliases:
          - nacos-server

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.2
    restart: unless-stopped
    ports:
      - "${DAMAI_ES_PORT:-9200}:9200"
      - "${DAMAI_ES_TRANSPORT_PORT:-9300}:9300"
    environment:
      discovery.type: single-node
      cluster.name: damai-es-cluster
      node.name: damai-es-node
      bootstrap.memory_lock: "true"
      xpack.security.enabled: "false"
      xpack.security.autoconfiguration.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: ${DAMAI_ES_JAVA_OPTS:--Xms768m -Xmx768m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS "http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=5s"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    networks:
      damai-network:
        aliases:
          - es

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    restart: unless-stopped
    ports:
      - "${DAMAI_ZOOKEEPER_PORT:-2181}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test:
        - CMD-SHELL
        - cub zk-ready 127.0.0.1 2181 30
      interval: 10s
      timeout: 35s
      retries: 12
      start_period: 20s
    networks:
      - damai-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${DAMAI_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${DAMAI_KAFKA_PORT:-9092}
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - cub kafka-ready -b 127.0.0.1:9092 1 30
      interval: 10s
      timeout: 35s
      retries: 12
      start_period: 30s
    networks:
      - damai-network

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "${DAMAI_PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${DAMAI_PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/damai-rules.yml:/etc/prometheus/damai-rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider http://127.0.0.1:9090/-/healthy
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - damai-network

networks:
  damai-network:
    name: damai-network
    driver: bridge

volumes:
  mysql-data:
  mysql-logs:
  redis-data:
  nacos-data:
  nacos-logs:
  es-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  prometheus-data:
