server:
  port: 8082

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: damai-program-service
  datasource:
    url: ${DAMAI_PROGRAM_DB_URL:${DAMAI_DB_URL:jdbc:mysql://${DAMAI_MYSQL_HOST:localhost}:${DAMAI_MYSQL_PORT:3306}/${DAMAI_MYSQL_DATABASE:myown_damai}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DAMAI_DB_USERNAME:root}
    password: ${DAMAI_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      repositories:
        enabled: false
      host: ${DAMAI_REDIS_HOST:localhost}
      port: ${DAMAI_REDIS_PORT:6379}
      password: ${DAMAI_REDIS_PASSWORD:}
      database: ${DAMAI_REDIS_DATABASE:0}
      timeout: 2s
  kafka:
    bootstrap-servers: ${DAMAI_KAFKA_BOOTSTRAP_SERVERS:${DAMAI_KAFKA_HOST:localhost}:${DAMAI_KAFKA_PORT:9092}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  cloud:
    nacos:
      username: ${DAMAI_NACOS_USERNAME:nacos}
      password: ${DAMAI_NACOS_PASSWORD:nacos}
      config:
        enabled: ${DAMAI_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        group: ${DAMAI_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yml
      discovery:
        enabled: ${DAMAI_NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${DAMAI_NACOS_REGISTER_ENABLED:true}
        server-addr: ${DAMAI_NACOS_SERVER_ADDR:localhost:8848}
        username: ${DAMAI_NACOS_USERNAME:nacos}
        password: ${DAMAI_NACOS_PASSWORD:nacos}
        namespace: ${DAMAI_NACOS_NAMESPACE:}
        service: ${spring.application.name}
        group: ${DAMAI_NACOS_GROUP:DEFAULT_GROUP}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  program:
    change:
      kafka-enabled: true
      topic: ${DAMAI_PROGRAM_CHANGE_TOPIC:damai-program-change}
      consumer-group: ${DAMAI_PROGRAM_CHANGE_CONSUMER_GROUP:damai-program-search-sync}
      send-timeout-seconds: 5
  cache:
    redis-enabled: true
    null-ttl-minutes: 5
    ttl-jitter-min-seconds: 0
    ttl-jitter-max-seconds: 60
    program-detail-ttl-hours: 2
    mutex-lock-seconds: 5
    mutex-wait-millis: 500
    mutex-retry-millis: 50
  search:
    es-enabled: true
    startup-sync-enabled: true
    uri: ${DAMAI_ES_URI:http://${DAMAI_ES_HOST:localhost}:${DAMAI_ES_PORT:9200}}
    username: ${DAMAI_ES_USERNAME:}
    password: ${DAMAI_ES_PASSWORD:}
    index-name: ${DAMAI_ES_PROGRAM_INDEX:damai_program_detail}
    connect-timeout-seconds: 2
    request-timeout-seconds: 5
    bloom:
      bit-size: 1048576
      hash-count: 5
