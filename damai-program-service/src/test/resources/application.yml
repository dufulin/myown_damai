spring:
  cloud:
    discovery:
      enabled: false
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
        register-enabled: false
  data:
    redis:
      repositories:
        enabled: false
  datasource:
    url: jdbc:h2:mem:damai;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

damai:
  cache:
    redis-enabled: false
  search:
    es-enabled: false
    startup-sync-enabled: false
